name: Windows Candidate Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows candidate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify source and release contract
        run: npm run check

      - name: Build unbundled Windows candidate
        run: npm run tauri:build

      - name: Collect Compatible evidence
        shell: pwsh
        run: ./scripts/prepare-compatible-evidence.ps1 -SkipBuild

      - name: Upload candidate and evidence
        uses: actions/upload-artifact@v4
        with:
          name: unicodeart-app-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/tauri-uniart.exe
            output/compatible-evidence/
          if-no-files-found: error
          retention-days: 14
