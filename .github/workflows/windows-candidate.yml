name: Windows Candidate Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows candidate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify source and release contract
        run: npm run check

      - name: Build NSIS Windows candidate
        run: npm run tauri:build

      - name: Verify silent NSIS upgrade and uninstall
        shell: pwsh
        run: |
          $fixtureVersion = '0.0.0-upgrade-fixture'
          $targetVersion = node -p "require('./package.json').version"
          npm run installer:fixture -- -FixtureVersion $fixtureVersion
          $initialInstaller = Get-ChildItem -LiteralPath src-tauri/target/release/bundle/nsis -Filter "*_$fixtureVersion`_*-setup.exe" -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          $targetInstaller = Get-ChildItem -LiteralPath src-tauri/target/release/bundle/nsis -Filter "*_$targetVersion`_*-setup.exe" -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $initialInstaller -or -not $targetInstaller) {
            throw '未找到升级烟雾测试所需的 NSIS 安装器。'
          }
          npm run installer:smoke -- `
            -InitialInstaller $initialInstaller `
            -ExpectedInitialVersion $fixtureVersion `
            -TargetInstaller $targetInstaller `
            -ExpectedTargetVersion $targetVersion `
            -ResultPath output/installer-smoke/windows-runner.json

      - name: Collect Compatible evidence
        shell: pwsh
        run: ./scripts/prepare-compatible-evidence.ps1 -SkipBuild

      - name: Upload candidate and evidence
        uses: actions/upload-artifact@v4
        with:
          name: unicodeart-app-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            output/compatible-evidence/
            output/installer-smoke/
          if-no-files-found: error
          retention-days: 14
